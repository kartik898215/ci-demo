  name: ci

  on: push

  jobs: 
   linting:
     runs-on: ubuntu-latest

     steps:
      - name: code checkout
        uses: actions/checkout/v3

      - name: setup python
        uses: actions/setup-python@v2
        python-version: '3.12' 

      - name: install flake8
        run:
           python -m pip install --upgrade pip
           pip install flake
      - name: run flake8
        run: |
           flake8_app.py
      
